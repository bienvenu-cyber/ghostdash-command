kind = "web"
previewPath = "/"
title = "Creator Earnings Dashboard"
version = "1.0.0"
id = "artifacts/earnings-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24759
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/earnings-dashboard run dev"

[services.env]
PORT = "24759"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/earnings-dashboard", "run", "build"]
publicDir = "artifacts/earnings-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
